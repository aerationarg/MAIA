<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rendiciones" />
  <title>Rendiciones IA</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="msal-browser.min.js"></script>
  <style>
    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface2: #f0efeb;
      --border: #e0dfd8;
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #9b9b97;
      --accent: #1a1a18;
      --accent-fg: #ffffff;
      --green: #2d6a2d;
      --green-bg: #eaf3ea;
      --amber: #7a5200;
      --amber-bg: #fdf3d7;
      --red: #a32d2d;
      --red-bg: #fcebeb;
      --blue: #1a4a8a;
      --blue-bg: #e6f0fb;
      --radius: 12px;
      --radius-sm: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1c1c1a;
        --surface2: #252522;
        --border: #2e2e2b;
        --text: #e8e8e4;
        --text2: #9b9b97;
        --text3: #6b6b67;
        --accent: #e8e8e4;
        --accent-fg: #111110;
        --green: #6dbf6d;
        --green-bg: #1a2e1a;
        --amber: #f0b429;
        --amber-bg: #2a2010;
        --red: #e57373;
        --red-bg: #2a1515;
        --blue: #6fa3e0;
        --blue-bg: #131c2a;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }

    /* Layout */
    .app { display: flex; flex-direction: column; height: 100dvh; }
    .header { padding: 16px 20px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; padding-top: max(16px, env(safe-area-inset-top, 16px)); }
    .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .header p { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .nav { display: flex; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; padding-bottom: max(var(--safe-bottom), 8px); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 6px; border: none; background: transparent; color: var(--text3); font-size: 10px; font-family: inherit; cursor: pointer; transition: color 0.15s; }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-btn.active { color: var(--text); }
    .nav-btn.active svg { stroke-width: 2.2; }

    /* Panels */
    .panel { display: none; padding: 20px; }
    .panel.active { display: block; }

    /* Cards */
    .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; margin-bottom: 12px; }
    .card-label { font-size: 12px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    /* Inputs */
    input, textarea, select { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); font-family: inherit; font-size: 15px; outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
    input:focus, textarea:focus { border-color: var(--text3); }
    input[type=password] { font-family: monospace; letter-spacing: 2px; }
    label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }

    /* Buttons */
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border-radius: var(--radius); font-size: 16px; font-weight: 500; font-family: inherit; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); color: var(--accent-fg); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
    .btn-sm { padding: 8px 14px; font-size: 14px; border-radius: var(--radius-sm); width: auto; }

    /* Upload zone */
    .drop-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 36px 20px; text-align: center; cursor: pointer; transition: background 0.15s; background: var(--surface); }
    .drop-zone.drag-over { background: var(--surface2); border-color: var(--text3); }
    .drop-icon { font-size: 40px; margin-bottom: 10px; }
    .drop-zone p { font-size: 15px; color: var(--text); margin-bottom: 4px; font-weight: 500; }
    .drop-zone span { font-size: 13px; color: var(--text2); }

    /* File list */
    .file-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 8px; }
    .file-icon { font-size: 24px; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .badge-pending { background: var(--amber-bg); color: var(--amber); }
    .badge-processing { background: var(--blue-bg); color: var(--blue); }
    .badge-done { background: var(--green-bg); color: var(--green); }
    .badge-error { background: var(--red-bg); color: var(--red); }

    /* Progress */
    .progress-wrap { margin-bottom: 16px; }
    .progress-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

    /* Fields */
    .field-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
    .field-row input { font-size: 14px; padding: 8px 10px; margin-bottom: 6px; }
    .field-row input:last-of-type { margin-bottom: 0; }
    .field-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
    .remove-btn { background: var(--red-bg); color: var(--red); border: none; border-radius: var(--radius-sm); padding: 6px 10px; font-size: 12px; cursor: pointer; font-family: inherit; }

    /* Results */
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .result-filename { font-size: 13px; color: var(--text2); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .result-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .result-row:last-child { border-bottom: none; padding-bottom: 0; }
    .result-key { font-size: 13px; color: var(--text2); flex-shrink: 0; max-width: 45%; }
    .result-val { font-size: 14px; font-weight: 500; text-align: right; word-break: break-word; }

    /* Admin lock */
    .locked-overlay { text-align: center; padding: 40px 20px; }
    .locked-overlay .lock-icon { font-size: 48px; margin-bottom: 12px; }
    .locked-overlay p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .hint { font-size: 12px; color: var(--text3); margin-top: 6px; line-height: 1.5; }
    .empty { text-align: center; padding: 48px 20px; color: var(--text2); font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
    .gap { height: 12px; }
    .row { display: flex; gap: 8px; }
    .row .btn { flex: 1; }
  </style>
</head>
<body>
<div class="app">
  <div class="header" style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1>📋 Rendiciones IA</h1>
      <p id="headerSub">Cargá comprobantes y extraé datos automáticamente</p>
    </div>
    <button id="msLoginBtn" onclick="toggleMsLogin()" style="border:1px solid var(--border);background:var(--surface2);color:var(--text2);border-radius:var(--radius-sm);padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0">
      Iniciar sesión
    </button>
  </div>

  <div class="content">
    <!-- PANEL: Cargar -->
    <div class="panel active" id="panel-upload">
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-icon">📎</div>
        <p>Tocá para seleccionar archivos</p>
        <span>PDF, JPG, JPEG, PNG</span>
      </div>
      <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFiles(this.files)" />

      <div class="gap"></div>
      <div id="fileList"></div>

      <div id="progressWrap" class="progress-wrap" style="display:none">
        <div class="progress-label"><span id="progressText">Procesando...</span><span id="progressPct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>

      <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeAll()" disabled>
        ✦ Analizar con IA
      </button>
    </div>

    <!-- PANEL: Resultados -->
    <div class="panel" id="panel-results">
      <div id="resultsArea">
        <div class="empty"><div class="empty-icon">📊</div>Aún no hay resultados.<br>Cargá y analizá archivos primero.</div>
      </div>
    </div>

    <!-- PANEL: Admin -->
    <div class="panel" id="panel-admin">
      <div id="adminContent"></div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" id="nav-upload" onclick="switchPanel('upload')">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Cargar
    </button>
    <button class="nav-btn" id="nav-results" onclick="switchPanel('results')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Resultados
    </button>
    <button class="nav-btn" id="nav-admin" onclick="switchPanel('admin')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M12 14c-5 0-8 2-8 3v1h16v-1c0-1-3-3-8-3z"/></svg>
      Admin
    </button>
  </nav>
</div>

<script>
// ── State ──────────────────────────────────────────────
const ADMIN_PIN_KEY  = 'rend_admin_pin';
const FIELDS_KEY     = 'rend_fields';
const API_KEY_KEY    = 'rend_api_key';
const WEBHOOK_KEY    = 'rend_webhook_url';
const SP_MODE_KEY    = 'rend_sp_mode'; // 'append' | 'new'

const DEFAULT_FIELDS = [
  { name: 'Fecha',               desc: 'Fecha del comprobante (DD/MM/AAAA)' },
  { name: 'Proveedor',           desc: 'Razón social o nombre del emisor' },
  { name: 'CUIT emisor',         desc: 'CUIT del proveedor (XX-XXXXXXXX-X)' },
  { name: 'Nro. comprobante',    desc: 'Número de factura o recibo' },
  { name: 'Tipo de comprobante', desc: 'Factura A, B, C, ticket, recibo, etc.' },
  { name: 'Neto gravado',        desc: 'Monto neto antes de impuestos' },
  { name: 'IVA',                 desc: 'Monto de IVA discriminado' },
  { name: 'Total',               desc: 'Importe total del comprobante' },
  { name: 'Concepto',            desc: 'Qué se compró o contrató' },
];

let files = [];
let results = JSON.parse(localStorage.getItem('rend_results') || '[]');
let cancelled = false;
let adminUnlocked = false;

function getFields()    { return JSON.parse(localStorage.getItem(FIELDS_KEY) || 'null') || DEFAULT_FIELDS; }
function saveFields(f)  { localStorage.setItem(FIELDS_KEY, JSON.stringify(f)); }
function getApiKey()    { return localStorage.getItem(API_KEY_KEY) || ''; }
function saveApiKey(k)  { localStorage.setItem(API_KEY_KEY, k); }
function getPin()       { return localStorage.getItem(ADMIN_PIN_KEY) || ''; }
function savePin(p)     { localStorage.setItem(ADMIN_PIN_KEY, p); }
function getWebhook()   { return localStorage.getItem(WEBHOOK_KEY) || ''; }
function saveWebhook(u) { localStorage.setItem(WEBHOOK_KEY, u); }
function getSpMode()    { return localStorage.getItem(SP_MODE_KEY) || 'append'; }
function saveSpMode(m)  { localStorage.setItem(SP_MODE_KEY, m); }
function saveResults()  { try { localStorage.setItem('rend_results', JSON.stringify(results)); } catch(e){} }

// ── Navigation ─────────────────────────────────────────
function switchPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'results') renderResults();
  if (name === 'admin') renderAdmin();
}

// ── File handling ──────────────────────────────────────
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

function handleFiles(list) {
  Array.from(list).forEach(f => {
    if (!files.find(x => x.file.name === f.name && x.file.size === f.size))
      files.push({ file: f, status: 'pending', error: null });
  });
  renderFileList();
  document.getElementById('analyzeBtn').disabled = !files.length || !getApiKey();
}

function formatSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

function renderFileList() {
  const el = document.getElementById('fileList');
  if (!files.length) { el.innerHTML = ''; return; }
  const icons = { 'application/pdf': '📄', 'image/png': '🖼️', 'image/jpeg': '🖼️' };
  const labels = { pending: 'Pendiente', processing: 'Procesando…', done: 'Listo ✓', error: 'Error' };
  const badgeClass = { pending: 'badge-pending', processing: 'badge-processing', done: 'badge-done', error: 'badge-error' };
  el.innerHTML = files.map((f, i) => `
    <div class="file-item">
      <div class="file-icon">${icons[f.file.type] || '📎'}</div>
      <div class="file-info">
        <div class="file-name">${esc(f.file.name)}</div>
        <div class="file-size">${formatSize(f.file.size)}${f.error ? ' · ' + esc(f.error) : ''}</div>
      </div>
      <span class="badge ${badgeClass[f.status]}">${labels[f.status]}</span>
    </div>`).join('');
  document.getElementById('analyzeBtn').disabled = !files.length || !getApiKey();
}

// ── Analysis ───────────────────────────────────────────
async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function analyzeAll() {
  const apiKey = getApiKey();
  if (!apiKey) { alert('Configurá la API key en el panel Admin.'); return; }
  const fields = getFields().filter(f => f.name.trim());
  if (!fields.length) { alert('Configurá al menos un campo en Admin.'); return; }

  cancelled = false;
  const btn = document.getElementById('analyzeBtn');
  btn.textContent = '⏹ Detener';
  btn.onclick = () => { cancelled = true; };

  const progressWrap = document.getElementById('progressWrap');
  progressWrap.style.display = 'block';

  let done = 0;
  const pending = files.filter(f => f.status !== 'done');

  for (let i = 0; i < files.length; i++) {
    if (cancelled) break;
    const item = files[i];
    if (item.status === 'done') { done++; continue; }

    item.status = 'processing';
    renderFileList();

    const pct = Math.round((done / files.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressText').textContent = `Analizando ${item.file.name}…`;

    try {
      const b64 = await fileToBase64(item.file);
      const isPdf = item.file.type === 'application/pdf';
      const mediaType = isPdf ? 'application/pdf' : item.file.type;
      const fieldPrompt = fields.map((f, idx) => `${idx+1}. ${f.name}${f.desc ? ': ' + f.desc : ''}`).join('\n');

      const systemPrompt = `Sos un asistente experto en análisis de comprobantes y documentos financieros argentinos.
Extraé información de documentos de rendición de gastos.
Respondé SOLO con JSON válido, sin texto adicional ni markdown.
Claves exactas: ${fields.map(f => `"${f.name}"`).join(', ')}
Si no encontrás un valor, usá null. Nunca inventes datos.`;

      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [{ role: 'user', content: [
            isPdf
              ? { type: 'document', source: { type: 'base64', media_type: mediaType, data: b64 } }
              : { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },
            { type: 'text', text: `Extraé estos campos:\n${fieldPrompt}\nRespondé solo con el JSON.` }
          ]}]
        })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.error?.message || `HTTP ${resp.status}`);
      }

      const data = await resp.json();
      const text = data.content?.find(c => c.type === 'text')?.text || '{}';
      const extracted = JSON.parse(text.replace(/```json|```/g, '').trim());
      extracted['__archivo__'] = item.file.name;
      extracted['__fecha_analisis__'] = new Date().toLocaleString('es-AR');
      item.status = 'done';
      item.error = null;

      const idx = results.findIndex(r => r['__archivo__'] === item.file.name);
      if (idx >= 0) results[idx] = extracted; else results.push(extracted);
      saveResults();

    } catch(e) {
      item.status = 'error';
      item.error = e.message.slice(0, 60);
    }

    done++;
    const pctDone = Math.round((done / files.length) * 100);
    document.getElementById('progressFill').style.width = pctDone + '%';
    document.getElementById('progressPct').textContent = pctDone + '%';
    renderFileList();
  }

  progressWrap.style.display = 'none';
  btn.textContent = '✦ Analizar con IA';
  btn.onclick = analyzeAll;
  btn.disabled = !files.length;

  if (results.length) switchPanel('results');
}

// ── Results ────────────────────────────────────────────
function renderResults() {
  const area = document.getElementById('resultsArea');
  if (!results.length) {
    area.innerHTML = `<div class="empty"><div class="empty-icon">📊</div>Aún no hay resultados.<br>Cargá y analizá archivos primero.</div>`;
    return;
  }
  const fields = getFields().filter(f => f.name.trim());
  const cards = results.map((r, ri) => {
    const rows = fields.map(f => `
      <div class="result-row">
        <span class="result-key">${esc(f.name)}</span>
        <span class="result-val">${esc(r[f.name] != null ? String(r[f.name]) : '—')}</span>
      </div>`).join('');
    return `
      <div class="result-card">
        <div class="result-filename">📄 ${esc(r['__archivo__'] || 'Archivo')} <span style="color:var(--text3);font-size:11px">${esc(r['__fecha_analisis__']||'')}</span></div>
        ${rows}
      </div>`;
  }).join('');

  area.innerHTML = `
    <div style="margin-bottom:16px;display:flex;flex-direction:column;gap:8px">
      <div class="row">
        <button class="btn btn-green btn-sm" onclick="exportExcel()">⬇ Excel local</button>
        <button class="btn btn-secondary btn-sm" onclick="clearResults()">🗑 Limpiar</button>
      </div>
      <button class="btn btn-primary" onclick="sendToSharePoint('append')" style="font-size:14px;padding:12px">☁️ Enviar a SharePoint</button>
    </div>
    ${cards}`;
}

function exportExcel() {
  const fields = getFields().filter(f => f.name.trim());
  const headers = ['Archivo', 'Fecha de análisis', ...fields.map(f => f.name)];
  const rows = results.map(r => [
    r['__archivo__'] || '',
    r['__fecha_analisis__'] || '',
    ...fields.map(f => r[f.name] != null ? r[f.name] : '')
  ]);
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = headers.map((h, i) => ({ wch: Math.min(Math.max(h.length, ...rows.map(r => String(r[i]||'').length)) + 2, 40) }));
  XLSX.utils.book_append_sheet(wb, ws, 'Rendiciones');
  XLSX.writeFile(wb, `rendiciones_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── Microsoft Auth (MSAL) ──────────────────────────────
const MSAL_CONFIG = {
  auth: {
    clientId: 'd1719d1c-2dcd-4ced-98f6-b474a926ac4f',
    authority: 'https://login.microsoftonline.com/f5b218f2-cdf7-4ce4-951b-9f3fd53d4202',
    redirectUri: 'https://federicocherny.github.io/Rendiciones/'
  },
  cache: { cacheLocation: 'localStorage' }
};
const SCOPES = ['Files.ReadWrite', 'Sites.Read.All', 'User.Read'];
const SHAREPOINT_HOST = 'aerationargentina.sharepoint.com';
const SITE_NAME = 'as';
const FOLDER_PATH = 'Documentos compartidos/Operaciones y Mantenimiento/IA/Admin/Pendientes';
const COMPROBANTES_PATH = 'Documentos compartidos/Operaciones y Mantenimiento/IA/Admin/Comprobantes';

let msalInstance = null;
let msAccount = null;

async function initMsal() {
  if (msalInstance) return;
  try {
    msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
    await msalInstance.initialize();
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length) {
      msAccount = accounts[0];
      updateLoginBtn();
    }
  } catch(e) {
    console.error('MSAL init error:', e);
    msalInstance = null;
    throw e;
  }
}

function updateLoginBtn() {
  const btn = document.getElementById('msLoginBtn');
  if (!btn) return;
  if (msAccount) {
    btn.textContent = '✅ ' + (msAccount.name || msAccount.username).split(' ')[0];
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
  } else {
    btn.textContent = 'Iniciar sesión';
    btn.style.color = 'var(--text2)';
    btn.style.borderColor = 'var(--border)';
  }
}

async function toggleMsLogin() {
  await initMsal();
  if (msAccount) {
    msalInstance.logoutPopup();
    msAccount = null;
    updateLoginBtn();
    return;
  }
  try {
    const resp = await msalInstance.loginPopup({ scopes: SCOPES });
    msAccount = resp.account;
    updateLoginBtn();
  } catch(e) {
    if (!e.message?.includes('cancelled')) alert('Error al iniciar sesión: ' + e.message);
  }
}

async function getMsToken() {
  await initMsal();
  if (!msAccount) {
    await toggleMsLogin();
    if (!msAccount) throw new Error('Necesitás iniciar sesión con Microsoft primero.');
  }
  const resp = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: msAccount })
    .catch(() => msalInstance.acquireTokenPopup({ scopes: SCOPES, account: msAccount }));
  return resp.accessToken;
}

async function getSiteId(token) {
  // Intentar primero como /sites/NOMBRE
  const urls = [
    `https://graph.microsoft.com/v1.0/sites/${SHAREPOINT_HOST}:/sites/${SITE_NAME}`,
    `https://graph.microsoft.com/v1.0/sites/${SHAREPOINT_HOST}:/${SITE_NAME}`,
    `https://graph.microsoft.com/v1.0/sites/${SHAREPOINT_HOST}`,
  ];
  for (const url of urls) {
    const resp = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
    if (resp.ok) {
      const data = await resp.json();
      console.log('Site ID obtenido desde:', url, data.id);
      return data.id;
    }
    console.log('Falló:', url, resp.status);
  }
  throw new Error('No se pudo acceder al sitio de SharePoint. Verificá los permisos.');
}

async function uploadToSharePoint(token, siteId, folderPath, fileName, content, isBase64 = false) {
  const encodedPath = folderPath.split('/').map(encodeURIComponent).join('/');
  const url = `https://graph.microsoft.com/v1.0/sites/${siteId}/drive/root:/${encodedPath}/${encodeURIComponent(fileName)}:/content`;
  const body = isBase64
    ? Uint8Array.from(atob(content), c => c.charCodeAt(0))
    : new Blob([content], { type: 'application/json' });
  const resp = await fetch(url, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + token },
    body
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || 'HTTP ' + resp.status);
  }
  return await resp.json();
}

async function sendToSharePoint(mode) {
  const btn = event.target;
  const original = btn.textContent;
  btn.textContent = '⏳ Conectando...';
  btn.disabled = true;

  try {
    const token = await getMsToken();
    btn.textContent = '⏳ Obteniendo sitio...';
    const siteId = await getSiteId(token);

    const fields = getFields().filter(f => f.name.trim());
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);

    // 1. Subir comprobantes originales
    const doneFiles = files.filter(f => f.status === 'done');
    for (let i = 0; i < doneFiles.length; i++) {
      const item = doneFiles[i];
      btn.textContent = `⏳ Subiendo ${item.file.name}...`;
      const b64 = await fileToBase64(item.file);
      await uploadToSharePoint(token, siteId, COMPROBANTES_PATH, item.file.name, b64, true);
    }

    // 2. Subir JSON con los datos extraídos
    btn.textContent = '⏳ Guardando datos...';
    const payload = {
      modo: mode,
      fecha_envio: new Date().toLocaleString('es-AR'),
      total_registros: results.length,
      campos: fields.map(f => f.name),
      registros: results.map(r => {
        const row = { archivo: r['__archivo__'] || '', fecha_analisis: r['__fecha_analisis__'] || '' };
        fields.forEach(f => { row[f.name] = r[f.name] != null ? r[f.name] : ''; });
        return row;
      })
    };
    const jsonFileName = `rendicion_${timestamp}.json`;
    await uploadToSharePoint(token, siteId, FOLDER_PATH, jsonFileName, JSON.stringify(payload, null, 2));

    alert(`✅ Listo!\n\n• ${doneFiles.length} comprobante(s) guardado(s) en SharePoint\n• Datos enviados para procesar en Excel\n\nPower Automate va a insertar las filas en unos segundos.`);

  } catch(e) {
    alert('❌ Error: ' + e.message);
  } finally {
    btn.textContent = original;
    btn.disabled = false;
  }
}

function clearResults() {
  if (!confirm('¿Borrar todos los resultados?')) return;
  results = [];
  saveResults();
  renderResults();
}

// ── Admin panel ────────────────────────────────────────
function renderAdmin() {
  const el = document.getElementById('adminContent');
  const pin = getPin();

  if (!pin) {
    el.innerHTML = `
      <div class="card">
        <div class="card-label">Primera vez — crear PIN de admin</div>
        <label>Elegí un PIN (mínimo 4 dígitos)</label>
        <input type="password" inputmode="numeric" id="newPin" placeholder="••••" maxlength="8" />
        <div class="gap"></div>
        <button class="btn btn-primary" onclick="createPin()">Crear PIN y entrar</button>
      </div>`;
    adminUnlocked = false;
    return;
  }

  if (!adminUnlocked) {
    el.innerHTML = `
      <div class="locked-overlay">
        <div class="lock-icon">🔒</div>
        <p>Ingresá el PIN de admin para configurar la app</p>
        <input type="password" inputmode="numeric" id="pinInput" placeholder="PIN" maxlength="8" style="max-width:200px;margin:0 auto 16px;text-align:center" onkeyup="if(event.key==='Enter')checkPin()" />
        <button class="btn btn-primary" style="max-width:200px;margin:0 auto" onclick="checkPin()">Entrar</button>
      </div>`;
    return;
  }

  renderAdminUnlocked(el);
}

function createPin() {
  const p = document.getElementById('newPin').value.trim();
  if (p.length < 4) { alert('El PIN debe tener al menos 4 dígitos.'); return; }
  savePin(p);
  adminUnlocked = true;
  renderAdmin();
}

function checkPin() {
  const entered = document.getElementById('pinInput').value.trim();
  if (entered === getPin()) { adminUnlocked = true; renderAdmin(); }
  else { alert('PIN incorrecto'); }
}

function renderAdminUnlocked(el) {
  const fields = getFields();
  const fieldRows = fields.map((f, i) => `
    <div class="field-row">
      <input value="${esc(f.name)}" placeholder="Nombre del campo" oninput="updateField(${i},'name',this.value)" />
      <input value="${esc(f.desc)}" placeholder="Descripción para la IA (opcional)" oninput="updateField(${i},'desc',this.value)" />
      <div class="field-actions">
        <button class="remove-btn" onclick="removeField(${i})">Eliminar</button>
      </div>
    </div>`).join('');

  el.innerHTML = `
    <div class="card">
      <div class="card-label">API Key de Anthropic</div>
      <label>Clave compartida del equipo</label>
      <input type="password" id="apiKeyInput" value="${esc(getApiKey())}" placeholder="sk-ant-..." oninput="saveApiKey(this.value)" />
      <p class="hint">Esta clave se guarda en el dispositivo. Solo visible para quien tenga el PIN.</p>
    </div>

    <div class="card">
      <div class="card-label">Campos a extraer</div>
      <div id="adminFieldList">${fieldRows}</div>
      <button class="btn btn-secondary" onclick="addField()" style="margin-top:4px">+ Agregar campo</button>
    </div>

    <div class="card">
      <div class="card-label">Integración SharePoint</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:10px">Los datos se suben directamente a SharePoint con tu cuenta Microsoft.</p>
      <p class="hint">📁 Comprobantes → <strong>Operaciones y Mantenimiento/IA/Admin/Comprobantes</strong></p>
      <p class="hint" style="margin-top:6px">📋 Datos JSON → <strong>Operaciones y Mantenimiento/IA/Admin/Pendientes</strong></p>
      <div class="gap"></div>
      <button class="btn btn-secondary" onclick="toggleMsLogin()">🔑 Iniciar sesión con Microsoft</button>
    </div>

    <div class="card">
      <div class="card-label">Seguridad</div>
      <label>Cambiar PIN de admin</label>
      <input type="password" inputmode="numeric" id="newPinChange" placeholder="Nuevo PIN" maxlength="8" />
      <div class="gap"></div>
      <button class="btn btn-secondary" onclick="changePin()">Cambiar PIN</button>
    </div>

    <div class="gap"></div>
    <button class="btn btn-secondary" onclick="adminUnlocked=false;renderAdmin()">🔒 Cerrar sesión admin</button>
    <div class="gap"></div>`;
}

function updateField(i, key, val) {
  const fields = getFields();
  fields[i][key] = val;
  saveFields(fields);
}

function addField() {
  const fields = getFields();
  fields.push({ name: '', desc: '' });
  saveFields(fields);
  renderAdmin();
}

function removeField(i) {
  const fields = getFields();
  fields.splice(i, 1);
  saveFields(fields);
  renderAdmin();
}

async function testWebhook() {
  const url = document.getElementById('webhookInput').value.trim();
  if (!url) { alert('Ingresá la URL del webhook primero.'); return; }
  const status = document.getElementById('webhookStatus');
  status.textContent = '⏳ Probando...';
  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ test: true, mensaje: 'Prueba de conexión desde Rendiciones IA' })
    });
    if (resp.ok || resp.status === 202) {
      status.textContent = '✅ Conectado correctamente';
      status.style.color = 'var(--green)';
    } else {
      status.textContent = '⚠️ HTTP ' + resp.status;
      status.style.color = 'var(--amber)';
    }
  } catch(e) {
    status.textContent = '❌ Sin conexión';
    status.style.color = 'var(--red)';
  }
}

function changePin() {
  const p = document.getElementById('newPinChange').value.trim();
  if (p.length < 4) { alert('El PIN debe tener al menos 4 dígitos.'); return; }
  savePin(p);
  alert('PIN actualizado.');
}

// ── Utils ──────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Service Worker registration ────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Update analyze button state on load
document.getElementById('analyzeBtn').disabled = !getApiKey();
initMsal().catch(() => {});
</script>
